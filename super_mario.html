<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>无敌的像素马里奥！</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,"Microsoft YaHei",sans-serif;-webkit-tap-highlight-color:transparent;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top,#d8f6ff 0%,#83d2ff 38%,#63bd52 39%,#2f8b43 100%);overflow:hidden;color:#1d1d1d;}
    .shell{position:relative;width:min(98vw,1120px);background:#fff;border:4px solid #1d1d1d;border-radius:24px;box-shadow:0 24px 70px rgba(0,0,0,.26);overflow:hidden;}
    .hud{height:60px;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 14px;background:linear-gradient(90deg,#ffd44e,#ff8b39);border-bottom:4px solid #1d1d1d;font-weight:900;}
    .brand{font-size:18px;letter-spacing:.7px;white-space:nowrap;}
    .stats{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;font-size:12px;}
    .pill{background:rgba(255,255,255,.78);border:2px solid rgba(0,0,0,.24);border-radius:999px;padding:6px 8px;white-space:nowrap;}
    canvas{display:block;width:100%;height:auto;background:linear-gradient(#79d4ff,#c5f2ff 58%,#62b956 58%,#2e8e3d);}
    .overlay{position:absolute;left:0;right:0;top:60px;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.62);backdrop-filter:blur(4px);padding:20px;text-align:center;z-index:5;}
    .panel{width:min(620px,92vw);background:rgba(255,255,255,.96);border:4px solid #1d1d1d;border-radius:24px;padding:24px;box-shadow:0 16px 34px rgba(0,0,0,.18);}
    .panel h1{font-size:clamp(32px,6vw,58px);color:#e6372e;text-shadow:3px 3px 0 #ffd85b;margin-bottom:8px;}
    .panel p{font-size:15px;color:#3d3d3d;line-height:1.75;margin:12px 0 16px;}
    .panel .small{font-size:13px;color:#666;}
    .btn-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:14px;}
    button{border:0;background:#e6372e;color:#fff;font-weight:900;font-size:17px;border:3px solid #1d1d1d;border-radius:999px;padding:12px 22px;cursor:pointer;box-shadow:0 6px 0 #8b1c17;transition:.08s;}
    button.secondary{background:#2e7bd8;box-shadow:0 6px 0 #18437b;}
    button:active{transform:translateY(5px);box-shadow:0 1px 0 #8b1c17;}
    .rank-box{margin-top:12px;background:#f6f1e8;border:3px solid #1d1d1d;border-radius:16px;padding:12px;text-align:left;}
    .rank-box h3{text-align:center;margin-bottom:8px;color:#e6372e;}
    .rank-row{display:flex;justify-content:space-between;gap:12px;padding:5px 0;border-bottom:1px dashed rgba(0,0,0,.18);font-size:13px;}
    .rank-row:last-child{border-bottom:0;}

    /* 小霸王手柄布局：左十字键，右 A/B，底部 Start/Pause */
    .fc-controls{display:none;align-items:center;justify-content:space-between;gap:14px;padding:12px 16px;background:#e8e8e8;border-top:4px solid #1d1d1d;}
    .dpad{width:118px;height:118px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:4px;}
    .fc-btn{user-select:none;display:flex;align-items:center;justify-content:center;background:#2b2b2b;color:#fff;border:3px solid #111;border-radius:12px;font-size:22px;font-weight:900;box-shadow:0 4px 0 #000;touch-action:none;}
    .fc-btn.blank{visibility:hidden;}
    .fc-btn.active,.fc-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #000;background:#ffcf4a;color:#111;}
    .middle-pad{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:84px;}
    .select-start{display:flex;gap:8px;}
    .tiny{font-size:11px;padding:6px 10px;border-radius:999px;background:#555;color:#fff;border:2px solid #222;box-shadow:0 3px 0 #111;}
    .ab-pad{display:flex;gap:16px;align-items:center;}
    .round-btn{width:58px;height:58px;border-radius:50%;background:#d82727;color:#fff;border:4px solid #7f1414;box-shadow:0 6px 0 #5d0f0f;font-size:20px;font-weight:900;}
    .round-btn.b{background:#2d7bdc;border-color:#17457d;box-shadow:0 6px 0 #0d2d52;}
    .round-btn.active,.round-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #5d0f0f;}

    @media(max-width:720px){body{align-items:flex-start;padding-top:4px}.shell{border-radius:18px}.hud{height:56px;padding:0 7px}.brand{font-size:13px}.stats{gap:4px;font-size:10.5px}.pill{padding:4px 5px}.overlay{top:56px;bottom:142px}.panel{padding:16px}.fc-controls{display:flex} }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hud">
      <div class="brand">无敌的像素马里奥！</div>
      <div class="stats">
        <div class="pill">Level <span id="levelText">1</span></div>
        <div class="pill">Coins <span id="coins">0</span></div>
        <div class="pill">Gems <span id="gems">0</span></div>
        <div class="pill">Lives <span id="lives">3</span></div>
        <div class="pill">Time <span id="time">180</span></div>
        <div class="pill">Dash <span id="dash">Ready</span></div>
      </div>
    </header>
    <canvas id="game" width="960" height="540"></canvas>

    <div id="overlay" class="overlay">
      <div class="panel">
        <h1>无敌的像素马里奥！</h1>
        <p>升级版：两关闯关、排行榜、小霸王手柄布局。收集金币和宝石，避开尖刺和敌人，第二关难度更高。</p>
        <p class="small">电脑：A/D 或方向键移动，W/↑/空格跳跃，Shift/X 冲刺，P 暂停。手机：左边十字键，右边 B 冲刺、A 跳跃。</p>
        <div class="btn-row">
          <button id="startBtn">开始游戏</button>
          <button id="rankBtn" class="secondary">查看排行榜</button>
        </div>
        <div id="rankBox" class="rank-box" style="display:none"></div>
      </div>
    </div>

    <div class="fc-controls">
      <div class="dpad">
        <div class="fc-btn blank"></div><div id="upBtn" class="fc-btn">↑</div><div class="fc-btn blank"></div>
        <div id="leftBtn" class="fc-btn">←</div><div class="fc-btn">＋</div><div id="rightBtn" class="fc-btn">→</div>
        <div class="fc-btn blank"></div><div id="downBtn" class="fc-btn">↓</div><div class="fc-btn blank"></div>
      </div>
      <div class="middle-pad">
        <div class="select-start">
          <div id="pauseBtn" class="tiny">SELECT</div>
          <div id="startSmallBtn" class="tiny">START</div>
        </div>
        <div style="font-size:11px;font-weight:900;color:#555;">小霸王布局</div>
      </div>
      <div class="ab-pad">
        <div id="dashBtn" class="round-btn b">B</div>
        <div id="jumpBtn" class="round-btn">A</div>
      </div>
    </div>
  </main>

  <script>
    // 单文件原创横版闯关游戏：两关、排行榜、小霸王手柄布局。
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const rankBtn = document.getElementById('rankBtn');
    const rankBox = document.getElementById('rankBox');
    const ui = {
      level: document.getElementById('levelText'), coins: document.getElementById('coins'), gems: document.getElementById('gems'),
      lives: document.getElementById('lives'), time: document.getElementById('time'), dash: document.getElementById('dash')
    };

    const W = canvas.width, H = canvas.height;
    const floorY = 468;
    const LB_KEY = 'pixelQuestDxLeaderboardV2';
    let cameraX = 0, raf = 0, timer = 0, gameState = 'menu', currentLevel = 0, timeLeft = 180, worldWidth = 4300;
    let audioCtx = null;

    const input = { left:false, right:false, jump:false, dash:false };
    const player = { x:70,y:280,w:36,h:48,vx:0,vy:0,dir:1,onGround:false,lives:3,coins:0,gems:0,shield:0,inv:0,dashCd:0,checkpointX:70,checkpointY:280 };
    const level = { platforms:[], moving:[], blocks:[], coins:[], gems:[], enemies:[], spikes:[], springs:[], powerups:[], particles:[], checkpoint:null, flag:null };

    const LEVELS = [
      {
        name:'草地冒险', time:180, width:4300, spawn:{x:70,y:280}, checkpoint:{x:2240,y:350,w:24,h:118,active:false}, flag:{x:4100,y:298,w:24,h:170},
        platforms:[[0,468,520,72,'grass'],[620,468,360,72,'grass'],[1080,468,430,72,'grass'],[1640,468,520,72,'grass'],[2320,468,560,72,'grass'],[3060,468,1180,72,'grass'],[350,360,150,28,'stone'],[720,315,150,28,'stone'],[1120,355,180,28,'stone'],[1420,285,150,28,'stone'],[1770,335,180,28,'stone'],[2130,300,160,28,'stone'],[2440,365,160,28,'stone'],[2740,305,160,28,'stone'],[3220,370,160,28,'stone'],[3600,320,180,28,'stone']],
        moving:[[900,390,130,24,840,1040,1.4,'x'],[1510,390,130,24,295,410,1.2,'y'],[2910,365,150,24,2840,3060,1.7,'x'],[3440,275,150,24,250,380,1.4,'y']],
        blocks:[[470,270,'coin'],[520,270,'shield'],[1210,260,'coin'],[1850,240,'gem'],[2480,260,'shield'],[3350,260,'coin']],
        coins:[[390,250],[430,315],[760,405],[820,250],[1160,315],[1220,405],[1450,250],[1810,315],[2170,405],[2510,250],[2780,315],[3260,405],[3650,250]],
        gems:[[880,270],[1560,250],[2870,275],[3470,210],[3750,250]],
        enemies:[['walker',720,434,640,940,1.45],['walker',1240,434,1100,1480,1.8],['walker',1780,434,1660,2120,1.55],['walker',2510,434,2340,2840,2.05],['flyer',1370,220,1320,1580,1.6],['flyer',2680,235,2500,2850,1.9],['flyer',3520,220,3350,3780,2.1]],
        spikes:[[560,444,70,24],[1000,444,70,24],[1530,444,70,24],[2200,444,70,24],[2990,444,70,24]], springs:[[1320,446,38,22],[3040,446,38,22]]
      },
      {
        name:'夜色城堡', time:210, width:5200, spawn:{x:70,y:260}, checkpoint:{x:2700,y:350,w:24,h:118,active:false}, flag:{x:5000,y:298,w:24,h:170}, theme:'night',
        platforms:[[0,468,420,72,'grass'],[520,468,260,72,'grass'],[900,468,300,72,'grass'],[1360,468,300,72,'grass'],[1820,468,330,72,'grass'],[2350,468,520,72,'grass'],[3100,468,350,72,'grass'],[3600,468,360,72,'grass'],[4200,468,920,72,'grass'],[300,355,135,28,'stone'],[610,295,135,28,'stone'],[1010,350,150,28,'stone'],[1280,275,140,28,'stone'],[1660,330,160,28,'stone'],[2070,285,150,28,'stone'],[2480,340,150,28,'stone'],[2860,285,150,28,'stone'],[3240,350,150,28,'stone'],[3820,305,170,28,'stone'],[4400,345,160,28,'stone']],
        moving:[[800,390,130,24,760,980,2.0,'x'],[1520,365,135,24,300,430,1.65,'y'],[2200,360,140,24,2120,2360,2.2,'x'],[3500,320,150,24,280,420,1.75,'y'],[4040,380,150,24,3940,4170,2.1,'x']],
        blocks:[[360,260,'coin'],[650,215,'gem'],[1120,260,'shield'],[1700,235,'coin'],[2500,250,'shield'],[3860,220,'gem'],[4480,250,'coin']],
        coins:[[330,300],[630,250],[950,410],[1050,305],[1300,235],[1600,420],[1980,240],[2120,240],[2520,295],[2900,235],[3280,310],[3860,255],[4300,410],[4550,300],[4720,300]],
        gems:[[700,210],[1400,230],[2300,295],[3550,230],[4050,330],[4630,260]],
        enemies:[['walker',570,434,540,760,2.1],['walker',980,434,920,1170,2.2],['walker',1880,434,1840,2120,2.35],['walker',2500,434,2380,2860,2.1],['walker',3180,434,3120,3430,2.35],['walker',4300,434,4240,5080,2.55],['flyer',1220,220,1040,1420,2.15],['flyer',2740,210,2500,3050,2.25],['flyer',3930,220,3650,4200,2.45]],
        spikes:[[430,444,85,24],[800,444,95,24],[1210,444,130,24],[1670,444,150,24],[2160,444,170,24],[2890,444,200,24],[3460,444,140,24],[3970,444,220,24]], springs:[[1160,446,38,22],[2320,446,38,22],[4160,446,38,22]]
      }
    ];

    function initAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if(audioCtx.state === 'suspended') audioCtx.resume(); }
    function tone(f,d=.1,type='square',vol=.055){ if(!audioCtx) return; const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=type;o.frequency.value=f;g.gain.value=vol;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d); }
    const sfx={ jump:()=>tone(540,.11,'square'), coin:()=>{tone(880,.07,'triangle');setTimeout(()=>tone(1160,.07,'triangle'),60)}, gem:()=>[680,920,1260].forEach((f,i)=>setTimeout(()=>tone(f,.08,'triangle'),i*55)), hit:()=>tone(130,.2,'sawtooth'), dash:()=>tone(260,.08,'sawtooth'), spring:()=>tone(740,.14,'square'), power:()=>[400,600,800].forEach((f,i)=>setTimeout(()=>tone(f,.1,'triangle'),i*80)), win:()=>[520,660,780,1040,1320].forEach((f,i)=>setTimeout(()=>tone(f,.13,'triangle'),i*110)) };

    function loadLevel(index, keepStats=false){
      const L = LEVELS[index]; currentLevel=index; worldWidth=L.width; timeLeft=L.time;
      level.platforms = L.platforms.map(p=>({x:p[0],y:p[1],w:p[2],h:p[3],t:p[4]}));
      level.moving = L.moving.map(m=>({x:m[0],y:m[1],w:m[2],h:m[3],min:m[4],max:m[5],speed:m[6],axis:m[7],dir:1,px:m[0],py:m[1],t:'stone'}));
      level.blocks = L.blocks.map(b=>({x:b[0],y:b[1],w:42,h:42,item:b[2],hit:false}));
      level.coins = L.coins.map(c=>({x:c[0],y:c[1],r:12,got:false}));
      level.gems = L.gems.map(g=>({x:g[0],y:g[1],r:14,got:false}));
      level.enemies = L.enemies.map((e,i)=>({type:e[0],x:e[1],y:e[2],w:e[0]==='flyer'?44:40,h:e[0]==='flyer'?30:34,min:e[3],max:e[4],vx:e[5],phase:i*.9,alive:true}));
      level.spikes = L.spikes.map(s=>({x:s[0],y:s[1],w:s[2],h:s[3]}));
      level.springs = L.springs.map(s=>({x:s[0],y:s[1],w:s[2],h:s[3]}));
      level.powerups=[]; level.particles=[]; level.checkpoint={...L.checkpoint}; level.flag={...L.flag}; cameraX=0;
      const oldCoins=player.coins, oldGems=player.gems, oldLives=player.lives;
      Object.assign(player,{x:L.spawn.x,y:L.spawn.y,w:36,h:48,vx:0,vy:0,dir:1,onGround:false,shield:0,inv:0,dashCd:0,checkpointX:L.spawn.x,checkpointY:L.spawn.y});
      player.coins = keepStats ? oldCoins : 0; player.gems = keepStats ? oldGems : 0; player.lives = keepStats ? oldLives : 3;
      updateUI(); draw();
    }

    function updateUI(){ ui.level.textContent=currentLevel+1; ui.coins.textContent=player.coins; ui.gems.textContent=player.gems; ui.lives.textContent=player.lives; ui.time.textContent=timeLeft; ui.dash.textContent=player.dashCd<=0?'Ready':Math.ceil(player.dashCd/10); }
    function leaderboard(){ try{return JSON.parse(localStorage.getItem(LB_KEY)||'[]')}catch(e){return[]} }
    function saveScore(){
      const score = player.coins*10 + player.gems*60 + player.lives*120 + timeLeft*6 + 1000;
      const name = (prompt('通关成功！输入你的名字上榜：','PLAYER') || 'PLAYER').slice(0,10);
      const list = leaderboard(); list.push({name,score,coins:player.coins,gems:player.gems,date:new Date().toLocaleDateString()});
      list.sort((a,b)=>b.score-a.score); localStorage.setItem(LB_KEY,JSON.stringify(list.slice(0,8))); return score;
    }
    function rankHTML(){ const list=leaderboard(); if(!list.length) return '<div class="rank-box"><h3>排行榜</h3><p style="text-align:center">暂无记录，先通关一次吧。</p></div>'; return '<div class="rank-box"><h3>排行榜 TOP 8</h3>'+list.map((r,i)=>`<div class="rank-row"><span>${i+1}. ${r.name}</span><span>${r.score} 分 / 💰${r.coins} / 💎${r.gems}</span></div>`).join('')+'</div>'; }
    function show(title,text,btn='开始游戏',extra=''){
      overlay.innerHTML=`<div class="panel"><h1>${title}</h1><p>${text}</p>${extra}<div class="btn-row"><button id="again">${btn}</button><button id="rankAgain" class="secondary">排行榜</button></div></div>`;
      overlay.style.display='flex'; document.getElementById('again').onclick=startGame; document.getElementById('rankAgain').onclick=()=>{overlay.querySelector('.panel').insertAdjacentHTML('beforeend',rankHTML());};
    }
    function startGame(){ initAudio(); loadLevel(0,false); gameState='playing'; overlay.style.display='none'; startTimer(); cancelAnimationFrame(raf); loop(); }
    function startTimer(){ if(timer) clearInterval(timer); timer=setInterval(()=>{ if(gameState==='playing'){timeLeft--; if(timeLeft<=0) damage(); updateUI();}},1000); }
    function nextLevel(){ loadLevel(1,true); gameState='playing'; overlay.style.display='none'; startTimer(); }

    function rect(a,b){return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;}
    function circleRect(c,r){const x=Math.max(r.x,Math.min(c.x,r.x+r.w)), y=Math.max(r.y,Math.min(c.y,r.y+r.h)); const dx=c.x-x,dy=c.y-y; return dx*dx+dy*dy<c.r*c.r;}
    function particles(x,y,color,n=8){for(let i=0;i<n;i++)level.particles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.8)*5,life:35,color});}
    function jump(){ if(player.onGround){ player.vy=-15.5; player.onGround=false; sfx.jump(); } }
    function dash(){ if(player.dashCd<=0){ player.vx=player.dir*13; player.dashCd=70; player.inv=Math.max(player.inv,10); sfx.dash(); particles(player.x+18,player.y+24,'#fff176',14); } }
    function damage(){
      if(player.inv>0) return;
      if(player.shield>0){ player.shield=0; player.inv=80; sfx.hit(); particles(player.x+18,player.y+24,'#5ee7ff',20); return; }
      player.lives--; sfx.hit(); updateUI();
      if(player.lives<=0){ gameState='over'; clearInterval(timer); show('Game Over',`你闯到了第 ${currentLevel+1} 关，收集了 ${player.coins} 枚金币和 ${player.gems} 颗宝石。`,'再玩一次'); return; }
      player.x=player.checkpointX; player.y=player.checkpointY; player.vx=0; player.vy=0; player.inv=100;
    }
    function updateMoving(){ level.moving.forEach(m=>{m.px=m.x;m.py=m.y; if(m.axis==='x'){m.x+=m.speed*m.dir;if(m.x<m.min||m.x>m.max)m.dir*=-1;}else{m.y+=m.speed*m.dir;if(m.y<m.min||m.y>m.max)m.dir*=-1;}}); }
    function collidePlatform(p,prevX,prevY){
      if(!rect(player,p)) return; const prevBottom=prevY+player.h, prevTop=prevY, prevRight=prevX+player.w, prevLeft=prevX;
      if(player.vy>=0 && prevBottom<=p.y+5){ player.y=p.y-player.h; player.vy=0; player.onGround=true; if(p.dx) player.x+=p.dx; }
      else if(player.vy<0 && prevTop>=p.y+p.h-5){ player.y=p.y+p.h; player.vy=0; if(p.block) hitBlock(p.block); }
      else if(player.vx>0 && prevRight<=p.x+4){ player.x=p.x-player.w; player.vx=0; }
      else if(player.vx<0 && prevLeft>=p.x+p.w-4){ player.x=p.x+p.w; player.vx=0; }
    }
    function hitBlock(b){
      if(b.hit) return; b.hit=true; particles(b.x+b.w/2,b.y,'#ffd45b',12); sfx.coin();
      if(b.item==='coin') player.coins+=3;
      if(b.item==='gem') level.gems.push({x:b.x+b.w/2,y:b.y-28,r:14,got:false});
      if(b.item==='shield'){ level.powerups.push({x:b.x+7,y:b.y-28,w:28,h:28,type:'shield',vx:1.2,vy:-3,active:true}); sfx.power(); }
      updateUI();
    }
    function updatePlayer(){
      const prevX=player.x, prevY=player.y; const accel=.75, friction=.84, gravity=.72;
      if(input.left){player.vx-=accel;player.dir=-1;} if(input.right){player.vx+=accel;player.dir=1;} if(!input.left&&!input.right)player.vx*=friction;
      player.vx=Math.max(-6.4,Math.min(6.4,player.vx)); player.vy+=gravity; player.vy=Math.min(18,player.vy);
      player.x+=player.vx; player.x=Math.max(0,Math.min(worldWidth-player.w,player.x)); player.y+=player.vy; player.onGround=false;
      level.platforms.forEach(p=>collidePlatform(p,prevX,prevY));
      level.moving.forEach(m=>collidePlatform({...m,dx:m.x-m.px},prevX,prevY));
      level.blocks.forEach(b=>collidePlatform({...b,t:'block',block:b},prevX,prevY));
      if(player.y>H+120) damage(); if(player.inv>0)player.inv--; if(player.dashCd>0)player.dashCd--;
      cameraX=Math.max(0,Math.min(worldWidth-W,player.x-W*.38));
    }
    function updateEnemies(){ level.enemies.forEach(e=>{ if(!e.alive)return; e.x+=e.vx; if(e.x<e.min||e.x>e.max)e.vx*=-1; if(e.type==='flyer') e.y=(currentLevel?210:235)+Math.sin(performance.now()/300+e.phase)*42; if(rect(player,e)){ const stomp=player.vy>0 && player.y+player.h-player.vy<=e.y+12; if(stomp){e.alive=false;player.vy=-10.5;player.coins+=2;particles(e.x+e.w/2,e.y+e.h/2,'#b66bff',16);sfx.hit();updateUI();} else damage(); } }); }
    function updateItems(){
      level.coins.forEach(c=>{ if(!c.got&&circleRect(c,player)){c.got=true;player.coins++;sfx.coin();particles(c.x,c.y,'#ffd331',8);updateUI();} });
      level.gems.forEach(g=>{ if(!g.got&&circleRect(g,player)){g.got=true;player.gems++;sfx.gem();particles(g.x,g.y,'#63f2ff',14);updateUI();} });
      level.spikes.forEach(s=>{ if(rect(player,s)) damage(); });
      level.springs.forEach(sp=>{ if(rect(player,sp)&&player.vy>=0){ player.y=sp.y-player.h; player.vy=-21; player.onGround=false; sfx.spring(); particles(sp.x+sp.w/2,sp.y,'#ff70ba',12); } });
      level.powerups.forEach(p=>{ if(!p.active)return; p.vy+=.35; p.x+=p.vx; p.y+=p.vy; level.platforms.forEach(pl=>{ if(rect(p,pl)&&p.vy>0){p.y=pl.y-p.h;p.vy=0;} }); if(rect(player,p)){p.active=false;player.shield=1;sfx.power();particles(player.x+18,player.y+20,'#5ee7ff',18);} });
      if(!level.checkpoint.active && player.x>level.checkpoint.x){ level.checkpoint.active=true; player.checkpointX=level.checkpoint.x+60; player.checkpointY=260; sfx.power(); particles(level.checkpoint.x,level.checkpoint.y,'#7cff7c',20); }
      if(player.x+player.w>level.flag.x){
        if(currentLevel===0){ gameState='between'; clearInterval(timer); sfx.win(); overlay.innerHTML=`<div class="panel"><h1>第二关加载中</h1><p>第一关通过！第二关“夜色城堡”会有更多尖刺、更快敌人和移动平台。当前金币 ${player.coins}，宝石 ${player.gems}。</p><button id="nextLevelBtn">进入第二关</button></div>`; overlay.style.display='flex'; document.getElementById('nextLevelBtn').onclick=nextLevel; }
        else { gameState='win'; clearInterval(timer); sfx.win(); const score=saveScore(); show('通关成功！',`两关全部完成！最终得分 ${score}，金币 ${player.coins}，宝石 ${player.gems}。`,'再玩一次',rankHTML()); }
      }
    }
    function updateParticles(){ level.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life--;}); for(let i=level.particles.length-1;i>=0;i--)if(level.particles[i].life<=0)level.particles.splice(i,1); }
    function update(){ if(gameState!=='playing')return; if(input.jump)jump(); if(input.dash){dash(); input.dash=false;} updateMoving(); updatePlayer(); updateEnemies(); updateItems(); updateParticles(); updateUI(); }

    function drawBg(){
      ctx.clearRect(0,0,W,H); const night=currentLevel===1; const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,night?'#17204b':'#78d5ff'); g.addColorStop(.58,night?'#3f4f83':'#c7f5ff'); g.addColorStop(.581,night?'#56413a':'#79c65a'); g.addColorStop(1,night?'#252525':'#33883f'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      if(night){ ctx.fillStyle='#ffeeb2'; ctx.beginPath(); ctx.arc(790-cameraX*.05,78,34,0,7); ctx.fill(); }
      [100,420,820,1300,1800,2420,3100,3650,4300].forEach((x,i)=>cloud(x-cameraX*.28,70+(i%3)*25,night));
      ctx.fillStyle=night?'#2a3159':'#5ab84c'; for(let x=-200;x<W+400;x+=300){const sx=x-(cameraX*.15%300);ctx.beginPath();ctx.moveTo(sx,468);ctx.lineTo(sx+150,310);ctx.lineTo(sx+300,468);ctx.fill();}
    }
    function cloud(x,y,night){ctx.fillStyle=night?'rgba(130,140,190,.5)':'rgba(255,255,255,.9)';ctx.beginPath();ctx.arc(x,y,24,0,7);ctx.arc(x+30,y-12,31,0,7);ctx.arc(x+64,y,22,0,7);ctx.rect(x-8,y,82,24);ctx.fill();}
    function drawPlatform(p){const x=p.x-cameraX;if(x+p.w<-50||x>W+50)return;ctx.fillStyle=p.t==='stone'?'#7b7f87':'#8a552b';ctx.fillRect(x,p.y,p.w,p.h);ctx.fillStyle=p.t==='stone'?'#aeb4bd':'#58b64c';ctx.fillRect(x,p.y,p.w,Math.min(15,p.h));ctx.strokeStyle='rgba(0,0,0,.28)';ctx.lineWidth=3;ctx.strokeRect(x,p.y,p.w,p.h);}
    function drawBlocks(){level.blocks.forEach(b=>{const x=b.x-cameraX;if(x<-60||x>W+60)return;ctx.fillStyle=b.hit?'#9b7653':'#ffc93d';ctx.fillRect(x,b.y,b.w,b.h);ctx.strokeStyle='#5b3518';ctx.lineWidth=3;ctx.strokeRect(x,b.y,b.w,b.h);ctx.fillStyle=b.hit?'#6e543c':'#8a4e00';ctx.font='bold 25px Arial';ctx.fillText(b.hit?'':'?',x+13,b.y+30);});}
    function drawCoins(){level.coins.forEach(c=>{if(c.got)return;const x=c.x-cameraX;ctx.fillStyle='#ffd331';ctx.beginPath();ctx.ellipse(x,c.y,c.r,c.r*1.25,0,0,7);ctx.fill();ctx.strokeStyle='#986400';ctx.lineWidth=3;ctx.stroke();ctx.fillStyle='#fff3a2';ctx.fillRect(x-3,c.y-9,6,18);});}
    function drawGems(){level.gems.forEach(g=>{if(g.got)return;const x=g.x-cameraX;ctx.fillStyle='#5ee7ff';ctx.beginPath();ctx.moveTo(x,g.y-16);ctx.lineTo(x+16,g.y);ctx.lineTo(x,g.y+16);ctx.lineTo(x-16,g.y);ctx.closePath();ctx.fill();ctx.strokeStyle='#126f82';ctx.lineWidth=3;ctx.stroke();});}
    function drawHazards(){level.spikes.forEach(s=>{const x=s.x-cameraX;ctx.fillStyle='#d92d2d';for(let i=0;i<s.w;i+=18){ctx.beginPath();ctx.moveTo(x+i,s.y+s.h);ctx.lineTo(x+i+9,s.y);ctx.lineTo(x+i+18,s.y+s.h);ctx.fill();}});level.springs.forEach(sp=>{const x=sp.x-cameraX;ctx.fillStyle='#ff70ba';ctx.fillRect(x,sp.y,sp.w,sp.h);ctx.strokeStyle='#67133f';ctx.lineWidth=3;ctx.strokeRect(x,sp.y,sp.w,sp.h);});}
    function drawEnemies(){level.enemies.forEach(e=>{if(!e.alive)return;const x=e.x-cameraX;ctx.fillStyle=e.type==='flyer'?'#ef5ba1':'#7a3fb7';ctx.fillRect(x,e.y,e.w,e.h);ctx.fillStyle='#fff';ctx.fillRect(x+8,e.y+8,7,7);ctx.fillRect(x+25,e.y+8,7,7);ctx.fillStyle='#111';ctx.fillRect(x+11,e.y+10,3,3);ctx.fillRect(x+28,e.y+10,3,3);if(e.type==='flyer'){ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.ellipse(x-8,e.y+8,18,8,-.4,0,7);ctx.ellipse(x+e.w+8,e.y+8,18,8,.4,0,7);ctx.fill();}});}
    function drawPowerups(){level.powerups.forEach(p=>{if(!p.active)return;const x=p.x-cameraX;ctx.fillStyle='#5ee7ff';ctx.beginPath();ctx.arc(x+p.w/2,p.y+p.h/2,p.w/2,0,7);ctx.fill();ctx.strokeStyle='#0b697e';ctx.lineWidth=3;ctx.stroke();ctx.fillStyle='#fff';ctx.font='bold 18px Arial';ctx.fillText('S',x+9,p.y+20);});}
    function drawCheckpoint(){const cp=level.checkpoint;if(!cp)return;const x=cp.x-cameraX;ctx.fillStyle='#7b4a28';ctx.fillRect(x,cp.y,cp.w,cp.h);ctx.fillStyle=cp.active?'#40d957':'#fff';ctx.fillRect(x+cp.w,cp.y+12,70,34);ctx.strokeStyle='#1d1d1d';ctx.strokeRect(x+cp.w,cp.y+12,70,34);}
    function drawFlag(){const f=level.flag;if(!f)return;const x=f.x-cameraX;ctx.fillStyle='#7b4a28';ctx.fillRect(x,f.y,f.w,f.h);ctx.fillStyle=currentLevel===1?'#7f4dff':'#ff3333';ctx.beginPath();ctx.moveTo(x+f.w,f.y+8);ctx.lineTo(x+f.w+100,f.y+38);ctx.lineTo(x+f.w,f.y+70);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 20px Arial';ctx.fillText(currentLevel===1?'FINAL':'GOAL',x+30,f.y+45);}
    function drawParticles(){level.particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/35);ctx.fillStyle=p.color;ctx.fillRect(p.x-cameraX,p.y,5,5);ctx.globalAlpha=1;});}
    function drawPlayer(){if(player.inv>0&&Math.floor(player.inv/6)%2===0)return;const x=player.x-cameraX,y=player.y;if(player.shield>0){ctx.strokeStyle='#5ee7ff';ctx.lineWidth=4;ctx.beginPath();ctx.arc(x+18,y+24,34,0,7);ctx.stroke();}ctx.save();if(player.dir<0){ctx.translate(x+36,y);ctx.scale(-1,1);}else ctx.translate(x,y);ctx.fillStyle='#e84132';ctx.fillRect(6,0,24,17);ctx.fillStyle='#ffd0a0';ctx.fillRect(8,14,22,18);ctx.fillStyle='#2874d9';ctx.fillRect(4,30,28,18);ctx.fillStyle='#111';ctx.fillRect(24,20,4,4);ctx.fillStyle='#6b3517';ctx.fillRect(2,44,12,5);ctx.fillRect(24,44,12,5);ctx.restore();}
    function draw(){drawBg();level.platforms.forEach(drawPlatform);level.moving.forEach(m=>drawPlatform({...m,t:'stone'}));drawBlocks();drawHazards();drawCoins();drawGems();drawPowerups();drawEnemies();drawCheckpoint();drawFlag();drawPlayer();drawParticles();}
    function loop(){update();draw();raf=requestAnimationFrame(loop);}

    function togglePause(){ if(gameState==='playing'){gameState='paused';show('Paused','游戏已暂停。点击按钮继续。','继续游戏');document.getElementById('again').onclick=()=>{overlay.style.display='none';gameState='playing';};} }
    document.addEventListener('keydown',e=>{ if(e.code==='ArrowLeft'||e.code==='KeyA')input.left=true; if(e.code==='ArrowRight'||e.code==='KeyD')input.right=true; if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='Space'){ if(!input.jump)jump(); input.jump=true; } if(e.code==='ShiftLeft'||e.code==='ShiftRight'||e.code==='KeyX')input.dash=true; if(e.code==='KeyP')togglePause(); });
    document.addEventListener('keyup',e=>{ if(e.code==='ArrowLeft'||e.code==='KeyA')input.left=false; if(e.code==='ArrowRight'||e.code==='KeyD')input.right=false; if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='Space')input.jump=false; });
    function bind(btn,key,action){const down=e=>{e.preventDefault();input[key]=true;btn.classList.add('active');if(action)action();};const up=e=>{e.preventDefault();input[key]=false;btn.classList.remove('active');};['touchstart','mousedown'].forEach(n=>btn.addEventListener(n,down,{passive:false}));['touchend','touchcancel','mouseup','mouseleave'].forEach(n=>btn.addEventListener(n,up,{passive:false}));}
    bind(document.getElementById('leftBtn'),'left'); bind(document.getElementById('rightBtn'),'right'); bind(document.getElementById('upBtn'),'jump',jump); bind(document.getElementById('jumpBtn'),'jump',jump); bind(document.getElementById('dashBtn'),'dash',dash); bind(document.getElementById('downBtn'),'dash',dash);
    document.getElementById('pauseBtn').onclick=togglePause; document.getElementById('startSmallBtn').onclick=()=>{ if(gameState==='menu'||gameState==='over')startGame(); };
    startBtn.onclick=startGame;
    rankBtn.onclick=()=>{rankBox.style.display=rankBox.style.display==='none'?'block':'none';rankBox.innerHTML=rankHTML().replace('<div class="rank-box">','').replace('</div>','');};
    loadLevel(0,false); draw();
  </script>
</body>
</html>
