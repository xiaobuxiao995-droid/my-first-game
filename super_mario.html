386,155,22,4380,4650,1.85,'x']],blocks:[[320,238,'coin'],[700,244,'shield'],[1840,220,'coin'],[2220,220,'gem'],[3090,224,'shield'],[4040,232,'coin'],[4440,190,'gem']],coins:[[300,315],[660,258],[1060,300],[1420,246],[1810,292],[2200,226],[2600,292],[3040,238],[3520,292],[4000,252],[4400,205],[4680,412]],gems:[[770,238],[1530,224],[2880,222],[3620,292],[4500,170]],enemies:[['walker',630,434,590,890,1.82],['walker',1640,434,1600,2010,1.92],['walker',2840,434,2780,3240,2.03],['walker',4260,434,4200,4900,2.15],['flyer',1180,206,1020,1460,1.95],['flyer',2420,200,2220,2630,2],['flyer',3780,200,3500,4100,2.1]],spikes:[[360,446,48,24],[780,446,48,24],[1300,446,54,24],[1900,446,58,24],[2460,446,58,24],[3150,446,62,24],[3900,446,60,24],[4700,446,66,24]],springs:[[900,448,38,22],[2820,448,38,22],[4240,448,38,22]]}];
function initAudio(){if(!audio)audio=new (window.AudioContext||window.webkitAudioContext)();if(audio.state==='suspended')audio.resume()}function tone(f,d=.1,type='sine',v=.045){if(!audio)return;let o=audio.createOscillator(),g=audio.createGain();o.type=type;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(audio.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,audio.currentTime+d);o.stop(audio.currentTime+d)}
const sfx={jump:()=>tone(580,.1,'triangle'),coin:()=>{tone(900,.06,'triangle');setTimeout(()=>tone(1180,.06,'triangle'),55)},gem:()=>[620,880,1240].forEach((f,i)=>setTimeout(()=>tone(f,.08,'triangle'),i*55)),hit:()=>tone(160,.18,'sawtooth'),dash:()=>tone(280,.07,'square'),spring:()=>tone(760,.12,'triangle'),power:()=>[420,640,880].forEach((f,i)=>setTimeout(()=>tone(f,.08,'triangle'),i*65)),win:()=>[520,660,820,980,1240].forEach((f,i)=>setTimeout(()=>tone(f,.11,'triangle'),i*90))};
function setLevel(i,keep=false){let a=LEVELS[i],old={coins:p.coins,gems:p.gems,lives:p.lives};cur=i;worldW=a.width;timeLeft=a.time;L.theme=a.theme;L.platforms=a.platforms.map(x=>({x:x[0],y:x[1],w:x[2],h:x[3],t:x[4]}));L.moving=a.moving.map(x=>({x:x[0],y:x[1],w:x[2],h:x[3],min:x[4],max:x[5],speed:x[6],axis:x[7],dir:1,px:x[0],py:x[1],t:'cloud'}));L.blocks=a.blocks.map(x=>({x:x[0],y:x[1],w:42,h:42,item:x[2],hit:false}));L.coins=a.coins.map(x=>({x:x[0],y:x[1],r:12,got:false}));L.gems=a.gems.map(x=>({x:x[0],y:x[1],r:14,got:false}));L.enemies=a.enemies.map((e,j)=>({type:e[0],x:e[1],y:e[2],w:e[0]==='flyer'?46:42,h:e[0]==='flyer'?30:36,min:e[3],max:e[4],vx:e[5],phase:j*.8,alive:true}));L.spikes=a.spikes.map(x=>({x:x[0],y:x[1],w:x[2],h:x[3]}));L.springs=a.springs.map(x=>({x:x[0],y:x[1],w:x[2],h:x[3]}));L.power=[];L.parts=[];L.cp={x:a.cp[0],y:a.cp[1],w:a.cp[2],h:a.cp[3],active:false};L.flag={x:a.flag[0],y:a.flag[1],w:a.flag[2],h:a.flag[3]};cam=0;Object.assign(p,{x:a.spawn[0],y:a.spawn[1],w:38,h:56,vx:0,vy:0,dir:1,on:false,shield:0,inv:0,dashCd:0,cx:a.spawn[0],cy:a.spawn[1]});p.coins=keep?old.coins:0;p.gems=keep?old.gems:0;p.lives=keep?old.lives:3;uiUpdate();draw()}
function uiUpdate(){ui.lv.textContent=cur+1;ui.coins.textContent=p.coins;ui.gems.textContent=p.gems;ui.lives.textContent=p.lives;ui.time.textContent=timeLeft;ui.dash.textContent=p.dashCd<=0?'Ready':Math.ceil(p.dashCd/10)}
function startTimer(){clearInterval(timer);timer=setInterval(()=>{if(state==='playing'){timeLeft--;if(timeLeft<=0)damage();uiUpdate()}},1000)}function startGame(){initAudio();setLevel(0,false);state='playing';overlay.style.display='none';startTimer();cancelAnimationFrame(raf);loop()}function nextLevel(){setLevel(1,true);state='playing';overlay.style.display='none';startTimer()}
function ranks(){try{return JSON.parse(localStorage.getItem(LB)||'[]')}catch{return[]}}function rankHTML(){let r=ranks();if(!r.length)return'<div class="rankbox"><h3>排行榜</h3><p style="text-align:center">暂无记录，先通关一次吧。</p></div>';return'<div class="rankbox"><h3>排行榜 TOP 8</h3>'+r.map((x,i)=>`<div class="rankrow"><span>${i+1}. ${x.name}</span><span>${x.score} 分 / 💰${x.coins} / 💎${x.gems}</span></div>`).join('')+'</div>'}function saveScore(){let score=p.coins*10+p.gems*60+p.lives*140+timeLeft*6+1000,name=(prompt('通关成功！输入你的名字上榜：','PLAYER')||'PLAYER').slice(0,10),r=ranks();r.push({name,score,coins:p.coins,gems:p.gems});r.sort((a,b)=>b.score-a.score);localStorage.setItem(LB,JSON.stringify(r.slice(0,8)));return score}
function show(title,text,label='开始游戏',extra=''){overlay.innerHTML=`<div class="panel"><h1>${title}</h1><p>${text}</p>${extra}<div class="btns"><button id="primary">${label}</button><button id="showRank" class="secondary">排行榜</button></div></div>`;overlay.style.display='flex';document.getElementById('showRank').onclick=()=>{let p=overlay.querySelector('.panel');if(!p.querySelector('.rankbox'))p.insertAdjacentHTML('beforeend',rankHTML())}}
function rect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function circleRect(c,r){let x=Math.max(r.x,Math.min(c.x,r.x+r.w)),y=Math.max(r.y,Math.min(c.y,r.y+r.h)),dx=c.x-x,dy=c.y-y;return dx*dx+dy*dy<c.r*c.r}function parts(x,y,color,n=8){for(let i=0;i<n;i++)L.parts.push({x,y,vx:(Math.random()-.5)*4.8,vy:(Math.random()-.8)*4.6,life:34,color})}
function jump(){if(p.on){p.vy=-15.5;p.on=false;sfx.jump()}}function dash(){if(p.dashCd<=0){p.vx=p.dir*12.5;p.dashCd=70;p.inv=Math.max(p.inv,10);sfx.dash();parts(p.x+18,p.y+28,'#fff1a6',12)}}function damage(){if(p.inv>0)return;if(p.shield>0){p.shield=0;p.inv=80;sfx.hit();parts(p.x+18,p.y+24,'#89e5ff',18);return}p.lives--;sfx.hit();uiUpdate();if(p.lives<=0){state='over';clearInterval(timer);show('Game Over',`你闯到了第 ${cur+1} 关，收集了 ${p.coins} 枚金币和 ${p.gems} 颗宝石。`,'再玩一次');document.getElementById('primary').onclick=startGame;return}p.x=p.cx;p.y=p.cy;p.vx=p.vy=0;p.inv=100}
function movePlatforms(){L.moving.forEach(m=>{m.px=m.x;m.py=m.y;if(m.axis==='x'){m.x+=m.speed*m.dir;if(m.x<m.min||m.x>m.max)m.dir*=-1}else{m.y+=m.speed*m.dir;if(m.y<m.min||m.y>m.max)m.dir*=-1}})}
function hitBlock(b){if(b.hit)return;b.hit=true;parts(b.x+b.w/2,b.y,'#ffd980',12);sfx.coin();if(b.item==='coin')p.coins+=3;if(b.item==='gem')L.gems.push({x:b.x+b.w/2,y:b.y-28,r:14,got:false});if(b.item==='shield'){L.power.push({x:b.x+7,y:b.y-28,w:28,h:28,vx:1.2,vy:-3,active:true});sfx.power()}uiUpdate()}
function collide(pl,px,py){if(!rect(p,pl))return;let pb=py+p.h,pt=py,pr=px+p.w,plf=px;if(pl.t==='cloud'){if(p.vy>=0&&pb<=pl.y+8){p.y=pl.y-p.h;p.vy=0;p.on=true;if(pl.dx)p.x+=pl.dx}return}if(pl.block){if(p.vy>=0&&pb<=pl.y+6){p.y=pl.y-p.h;p.vy=0;p.on=true;return}if(p.vy<0&&pt>=pl.y+pl.h-6){p.y=pl.y+pl.h;p.vy=0;hitBlock(pl.block);return}return}if(p.vy>=0&&pb<=pl.y+6){p.y=pl.y-p.h;p.vy=0;p.on=true;if(pl.dx)p.x+=pl.dx}else if(p.vy<0&&pt>=pl.y+pl.h-6){p.y=pl.y+pl.h;p.vy=0}else if(p.vx>0&&pr<=pl.x+6){p.x=pl.x-p.w;p.vx=0}else if(p.vx<0&&plf>=pl.x+pl.w-6){p.x=pl.x+pl.w;p.vx=0}}
function updatePlayer(){let px=p.x,py=p.y,acc=.74,fr=.84,gr=.72;if(input.left){p.vx-=acc;p.dir=-1}if(input.right){p.vx+=acc;p.dir=1}if(!input.left&&!input.right)p.vx*=fr;p.vx=Math.max(-6.6,Math.min(6.6,p.vx));p.vy+=gr;p.vy=Math.min(18,p.vy);p.x+=p.vx;p.x=Math.max(0,Math.min(worldW-p.w,p.x));p.y+=p.vy;p.on=false;L.platforms.forEach(q=>collide(q,px,py));L.moving.forEach(m=>collide({...m,dx:m.x-m.px},px,py));L.blocks.forEach(b=>collide({...b,block:b},px,py));if(p.y>H+120)damage();if(p.inv>0)p.inv--;if(p.dashCd>0)p.dashCd--;cam=Math.max(0,Math.min(worldW-W,p.x-W*.38))}
function updateEnemies(){L.enemies.forEach(e=>{if(!e.alive)return;e.x+=e.vx;if(e.x<e.min||e.x>e.max)e.vx*=-1;if(e.type==='flyer'){let base=L.theme==='sunset'?210:225;e.y=base+Math.sin(performance.now()/320+e.phase)*34}if(rect(p,e)){let stomp=p.vy>0&&p.y+p.h-p.vy<=e.y+12;if(stomp){e.alive=false;p.vy=-10.5;p.coins+=2;parts(e.x+e.w/2,e.y+e.h/2,'#c996ff',16);sfx.hit();uiUpdate()}else damage()}})}
function updateItems(){L.coins.forEach(c=>{if(!c.got&&circleRect(c,p)){c.got=true;p.coins++;sfx.coin();parts(c.x,c.y,'#ffe27d',8);uiUpdate()}});L.gems.forEach(g=>{if(!g.got&&circleRect(g,p)){g.got=true;p.gems++;sfx.gem();parts(g.x,g.y,'#79edff',12);uiUpdate()}});L.spikes.forEach(s=>{if(rect(p,s))damage()});L.springs.forEach(s=>{if(rect(p,s)&&p.vy>=0){p.y=s.y-p.h;p.vy=-21;p.on=false;sfx.spring();parts(s.x+s.w/2,s.y,'#ff9cdd',12)}});L.power.forEach(o=>{if(!o.active)return;o.vy+=.35;o.x+=o.vx;o.y+=o.vy;L.platforms.forEach(pl=>{if(rect(o,pl)&&o.vy>0){o.y=pl.y-o.h;o.vy=0}});if(rect(p,o)){o.active=false;p.shield=1;sfx.power();parts(p.x+18,p.y+24,'#89e5ff',18)}});if(!L.cp.active&&p.x>L.cp.x){L.cp.active=true;p.cx=L.cp.x+60;p.cy=260;sfx.power();parts(L.cp.x,L.cp.y,'#7ff0a0',18)}if(p.x+p.w>L.flag.x){if(cur===0){state='between';clearInterval(timer);sfx.win();overlay.innerHTML=`<div class="panel"><h1>第二关加载中</h1><p>第一关通过！第二关“暮色城境”的地刺也已放在真实地面上。</p><div class="btns"><button id="next">进入第二关</button></div></div>`;overlay.style.display='flex';document.getElementById('next').onclick=nextLevel}else{state='win';clearInterval(timer);sfx.win();let score=saveScore();show('通关成功！',`两关全部完成！最终得分 ${score}。金币 ${p.coins}，宝石 ${p.gems}。`,'再玩一次',rankHTML());document.getElementById('primary').onclick=startGame}}}
function updateParts(){L.parts.forEach(a=>{a.x+=a.vx;a.y+=a.vy;a.vy+=.16;a.life--});for(let i=L.parts.length-1;i>=0;i--)if(L.parts[i].life<=0)L.parts.splice(i,1)}function update(){if(state!=='playing')return;if(input.jump)jump();if(input.dash){dash();input.dash=false}movePlatforms();updatePlayer();updateEnemies();updateItems();updateParts();uiUpdate()}
function rr(x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke()}}
function bg(){let sun=L.theme==='sunset',g=ctx.createLinearGradient(0,0,0,H);if(sun){g.addColorStop(0,'#7d8cff');g.addColorStop(.28,'#ffb3a5');g.addColorStop(.58,'#ffe8c5');g.addColorStop(.581,'#b7d38d');g.addColorStop(1,'#6c8f61')}else{g.addColorStop(0,'#77d4ff');g.addColorStop(.58,'#dbf8ff');g.addColorStop(.581,'#a2df8c');g.addColorStop(1,'#6dbb61')}ctx.fillStyle=g;ctx.fillRect(0,0,W,H);if(sun){ctx.fillStyle='rgba(255,244,214,.88)';ctx.beginPath();ctx.arc(810-cam*.05,92,42,0,7);ctx.fill()}[120,500,980,1450,2050,2620,3300,3920,4550].forEach((x,i)=>{let sx=x-cam*.26,y=70+(i%3)*24;ctx.fillStyle=sun?'rgba(255,238,235,.62)':'rgba(255,255,255,.88)';ctx.beginPath();ctx.arc(sx,y,26,0,7);ctx.arc(sx+32,y-14,34,0,7);ctx.arc(sx+70,y,24,0,7);ctx.rect(sx-8,y,86,24);ctx.fill()});ctx.fillStyle=sun?'#9eb97f':'#8dcf7b';for(let x=-240;x<W+420;x+=260){let sx=x-(cam*.14%260);ctx.beginPath();ctx.moveTo(sx,470);ctx.quadraticCurveTo(sx+90,350,sx+180,470);ctx.quadraticCurveTo(sx+250,380,sx+320,470);ctx.fill()}for(let x=100;x<worldW;x+=420){let sx=x-cam*.35;if(sx<-100||sx>W+100)continue;ctx.fillStyle=sun?'#7f5d53':'#8b6355';ctx.fillRect(sx,390,12,60);ctx.fillStyle=sun?'#d18db1':'#b8dfa2';ctx.beginPath();ctx.arc(sx+6,372,34,0,7);ctx.fill();ctx.beginPath();ctx.arc(sx-14,382,22,0,7);ctx.fill();ctx.beginPath();ctx.arc(sx+26,384,22,0,7);ctx.fill()}}
function drawPlatform(q){let x=q.x-cam;if(x+q.w<-60||x>W+60)return;if(q.t==='grass'){let gr=ctx.createLinearGradient(0,q.y,0,q.y+q.h);gr.addColorStop(0,'#87d36c');gr.addColorStop(.25,'#66b95b');gr.addColorStop(1,'#6f8a58');rr(x,q.y,q.w,q.h,22,gr,'#5a7a4e');ctx.fillStyle='rgba(255,255,255,.45)';ctx.fillRect(x+14,q.y+8,q.w-28,8)}else{let gr=ctx.createLinearGradient(0,q.y,0,q.y+q.h);gr.addColorStop(0,'#fff');gr.addColorStop(1,'#d9e6ff');rr(x,q.y,q.w,q.h,18,gr,'#a9bde6')}}
function drawBlocks(){L.blocks.forEach(b=>{let x=b.x-cam;if(x<-60||x>W+60)return;rr(x,b.y,b.w,b.h,10,b.hit?'#d1c6b9':'#ffe08a',b.hit?'#a18f7a':'#e0b046');if(!b.hit){ctx.fillStyle='#c68922';ctx.font='bold 26px Arial';ctx.fillText('?',x+13,b.y+30)}})}
function drawCoins(){L.coins.forEach(c=>{if(c.got)return;let x=c.x-cam,gr=ctx.createRadialGradient(x-4,c.y-6,2,x,c.y,14);gr.addColorStop(0,'#fff7ba');gr.addColorStop(1,'#f4b63f');ctx.fillStyle=gr;ctx.beginPath();ctx.ellipse(x,c.y,c.r,c.r*1.24,0,0,7);ctx.fill();ctx.strokeStyle='#c48d1f';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillRect(x-3,c.y-9,6,18)})}function drawGems(){L.gems.forEach(g=>{if(g.got)return;let x=g.x-cam;ctx.fillStyle='#7eecff';ctx.beginPath();ctx.moveTo(x,g.y-16);ctx.lineTo(x+16,g.y);ctx.lineTo(x,g.y+16);ctx.lineTo(x-16,g.y);ctx.closePath();ctx.fill();ctx.strokeStyle='#43a7bb';ctx.lineWidth=2;ctx.stroke()})}
function drawHazards(){L.spikes.forEach(s=>{let x=s.x-cam;ctx.fillStyle='#f06a74';for(let i=0;i<s.w;i+=18){ctx.beginPath();ctx.moveTo(x+i,s.y+s.h);ctx.lineTo(x+i+9,s.y+2);ctx.lineTo(x+i+18,s.y+s.h);ctx.fill()}});L.springs.forEach(s=>rr(s.x-cam,s.y,s.w,s.h,10,'#ff8fcb','#c85d99'))}
function drawEnemies(){L.enemies.forEach(e=>{if(!e.alive)return;let x=e.x-cam;if(e.type==='walker'){ctx.fillStyle='#8c66f3';ctx.beginPath();ctx.ellipse(x+e.w/2,e.y+e.h/2+3,e.w/2,e.h/2,0,0,7);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x+15,e.y+13,5,0,7);ctx.arc(x+28,e.y+13,5,0,7);ctx.fill();ctx.fillStyle='#202433';ctx.beginPath();ctx.arc(x+15,e.y+13,2,0,7);ctx.arc(x+28,e.y+13,2,0,7);ctx.fill()}else{ctx.fillStyle='#ff7da7';ctx.beginPath();ctx.ellipse(x+e.w/2,e.y+e.h/2,18,12,0,0,7);ctx.fill();ctx.fillStyle='rgba(255,255,255,.85)';ctx.beginPath();ctx.ellipse(x+4,e.y+8,16,8,-.35,0,7);ctx.ellipse(x+e.w-4,e.y+8,16,8,.35,0,7);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x+16,e.y+12,4,0,7);ctx.arc(x+29,e.y+12,4,0,7);ctx.fill();ctx.fillStyle='#202433';ctx.beginPath();ctx.arc(x+16,e.y+12,2,0,7);ctx.arc(x+29,e.y+12,2,0,7);ctx.fill()}})}
function drawPower(){L.power.forEach(o=>{if(!o.active)return;let x=o.x-cam;ctx.fillStyle='#7de8ff';ctx.beginPath();ctx.arc(x+o.w/2,o.y+o.h/2,o.w/2,0,7);ctx.fill();ctx.strokeStyle='#43a7bb';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#fff';ctx.font='bold 18px Arial';ctx.fillText('S',x+9,o.y+20)})}function drawCP(){let c=L.cp,x=c.x-cam;ctx.fillStyle='#d09a75';ctx.fillRect(x,c.y,c.w,c.h);rr(x+c.w,c.y+12,74,34,12,c.active?'#7ff0a0':'#fdfdfd',c.active?'#4aaa68':'#cbd7ef')}function drawFlag(){let f=L.flag,x=f.x-cam;ctx.fillStyle='#d09a75';ctx.fillRect(x,f.y,f.w,f.h);ctx.fillStyle=cur===1?'#8d7cff':'#ff8a72';ctx.beginPath();ctx.moveTo(x+f.w,f.y+8);ctx.quadraticCurveTo(x+f.w+74,f.y+34,x+f.w,f.y+66);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 18px Arial';ctx.fillText(cur===1?'FINAL':'GOAL',x+30,f.y+42)}function drawParts(){L.parts.forEach(a=>{ctx.globalAlpha=Math.max(0,a.life/34);ctx.fillStyle=a.color;ctx.beginPath();ctx.arc(a.x-cam,a.y,3,0,7);ctx.fill();ctx.globalAlpha=1})}
function drawPlayer(){if(p.inv>0&&Math.floor(p.inv/6)%2===0)return;let x=p.x-cam,y=p.y;if(p.shield>0){ctx.strokeStyle='rgba(125,232,255,.9)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(x+19,y+28,36,0,7);ctx.stroke()}ctx.save();if(p.dir<0){ctx.translate(x+p.w,y);ctx.scale(-1,1)}else ctx.translate(x,y);ctx.fillStyle='#43527a';ctx.beginPath();ctx.ellipse(19,14,14,12,0,0,7);ctx.fill();ctx.fillStyle='#ffd8be';ctx.beginPath();ctx.ellipse(19,18,12,11,0,0,7);ctx.fill();ctx.fillStyle='#ff6a70';ctx.beginPath();ctx.ellipse(19,28,13,7,0,0,7);ctx.fill();let gr=ctx.createLinearGradient(0,30,0,56);gr.addColorStop(0,'#f5f8ff');gr.addColorStop(1,'#dfe9ff');rr(8,30,22,18,8,gr,'#c1d2f5');ctx.fillStyle='#4b7dff';ctx.fillRect(10,45,8,11);ctx.fillRect(21,45,8,11);ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(15,17,3,4,0,0,7);ctx.ellipse(23,17,3,4,0,0,7);ctx.fill();ctx.fillStyle='#2d3854';ctx.beginPath();ctx.arc(15,18,1.4,0,7);ctx.arc(23,18,1.4,0,7);ctx.fill();ctx.fillStyle='#7b5749';ctx.beginPath();ctx.ellipse(11,56,7,4,0,0,7);ctx.ellipse(27,56,7,4,0,0,7);ctx.fill();ctx.restore()}
function draw(){bg();L.platforms.forEach(drawPlatform);L.moving.forEach(drawPlatform);drawBlocks();drawHazards();drawCoins();drawGems();drawPower();drawEnemies();drawCP();drawFlag();drawPlayer();drawParts()}function loop(){update();draw();raf=requestAnimationFrame(loop)}
function pause(){if(state==='playing'){state='paused';show('Paused','游戏已暂停。点击按钮继续。','继续游戏');document.getElementById('primary').onclick=()=>{overlay.style.display='none';state='playing'}}}document.addEventListener('keydown',e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')input.left=true;if(e.code==='ArrowRight'||e.code==='KeyD')input.right=true;if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='Space'){if(!input.jump)jump();input.jump=true}if(e.code==='ShiftLeft'||e.code==='ShiftRight'||e.code==='KeyX')input.dash=true;if(e.code==='KeyP')pause()});document.addEventListener('keyup',e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')input.left=false;if(e.code==='ArrowRight'||e.code==='KeyD')input.right=false;if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='Space')input.jump=false});
function tap(el,down,up){let d=e=>{e.preventDefault();el.classList.add('active');down()},u=e=>{e.preventDefault();el.classList.remove('active');if(up)up()};['touchstart','mousedown'].forEach(n=>el.addEventListener(n,d,{passive:false}));['touchend','touchcancel','mouseup','mouseleave'].forEach(n=>el.addEventListener(n,u,{passive:false}))}tap(document.getElementById('jumpBtn'),()=>{input.jump=true;jump()},()=>input.jump=false);tap(document.getElementById('dashBtn'),()=>{input.dash=true;dash()},()=>input.dash=false);document.getElementById('mStart').onclick=()=>{if(['menu','over','win'].includes(state))startGame()};document.getElementById('mPause').onclick=pause;
const jb=document.getElementById('joyBase'),js=document.getElementById('joyStick');let joy=false;function joyMove(clientX){let r=jb.getBoundingClientRect(),dx=clientX-(r.left+r.width/2),c=Math.max(-28,Math.min(28,dx));js.style.transform=`translate(${c}px,0)`;input.left=c<-10;input.right=c>10}function joyEnd(){js.style.transform='translate(0,0)';input.left=false;input.right=false;joy=false}jb.addEventListener('touchstart',e=>{joy=true;joyMove(e.touches[0].clientX)},{passive:false});jb.addEventListener('touchmove',e=>{if(joy){e.preventDefault();joyMove(e.touches[0].clientX)}},{passive:false});jb.addEventListener('touchend',joyEnd,{passive:false});jb.addEventListener('touchcancel',joyEnd,{passive:false});jb.addEventListener('mousedown',e=>{joy=true;joyMove(e.clientX)});window.addEventListener('mousemove',e=>{if(joy)joyMove(e.clientX)});window.addEventListener('mouseup',joyEnd);
document.getElementById('start').onclick=startGame;document.getElementById('rank').onclick=()=>{let box=document.getElementById('rankBox');box.style.display=box.style.display==='none'?'block':'none';box.innerHTML=rankHTML().replace('<div class="rankbox">','').replace('</div>','')};setLevel(0,false);draw();
</script></body></html>
