function tone(f,d=.1,type='sine',v=.045){if(!audio)return;let o=audio.createOscillator(),g=audio.createGain();o.type=type;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(audio.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,audio.currentTime+d);o.stop(audio.currentTime+d)}function audioOn(){if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)();if(audio.state==='suspended')audio.resume()}const sfx={j:()=>tone(580,.1,'triangle'),c:()=>{tone(900,.06,'triangle');setTimeout(()=>tone(1180,.06,'triangle'),55)},h:()=>tone(160,.18,'sawtooth'),d:()=>tone(280,.07,'square'),w:()=>[520,660,820,980,1240].forEach((f,i)=>setTimeout(()=>tone(f,.1,'triangle'),i*90))};
function load(n,keep=false){let m=MAP[n],old={c:P.c,g:P.g,hp:P.hp};lv=n;world=m.w;time=m.t;O.theme=m.theme;O.p=m.p.map(a=>({x:a[0],y:a[1],w:a[2],h:70,t:'g'}));O.cloud=m.cloud.map(a=>({x:a[0],y:a[1],w:a[2],h:24,t:'c'}));O.move=m.move.map(a=>({x:a[0],y:a[1],w:a[2],h:22,min:a[3],max:a[4],s:a[5],axis:a[6],dir:1,px:a[0],py:a[1],t:'c'}));O.trap=m.trap.map(a=>({x:a[0],y:a[1],w:a[2],h:24}));O.coin=m.coin.map(a=>({x:a[0],y:a[1],r:12,got:false}));O.gem=m.gem.map(a=>({x:a[0],y:a[1],r:14,got:false}));O.mob=m.mob.map((a,i)=>({type:a[0],x:a[1],y:a[2],w:a[0]=='f'?46:42,h:a[0]=='f'?30:36,min:a[3],max:a[4],vx:a[5],phase:i*.8,alive:true}));O.spring=m.spring.map(a=>({x:a[0],y:a[1],w:38,h:22}));O.cp={x:m.cp[0],y:m.cp[1],w:22,h:120,on:false};O.flag={x:m.flag[0],y:m.flag[1],w:22,h:170};O.parts=[];cam=0;Object.assign(P,{x:m.spawn[0],y:m.spawn[1],vx:0,vy:0,on:false,dir:1,inv:0,dash:0,cx:m.spawn[0],cy:m.spawn[1]});P.c=keep?old.c:0;P.g=keep?old.g:0;P.hp=keep?old.hp:3;ui();draw()}
function ui(){U.l.textContent=lv+1;U.c.textContent=P.c;U.g.textContent=P.g;U.hp.textContent=P.hp;U.t.textContent=time;U.d.textContent=P.dash<=0?'OK':Math.ceil(P.dash/10)}function startTimer(){clearInterval(timer);timer=setInterval(()=>{if(state=='play'){time--;if(time<=0)hurt();ui()}},1000)}function start(){audioOn();load(0,false);state='play';cover.style.display='none';startTimer();cancelAnimationFrame(raf);loop()}function next(){load(lv+1,true);state='play';cover.style.display='none';startTimer()}
function R(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function CR(c,r){let xx=Math.max(r.x,Math.min(c.x,r.x+r.w)),yy=Math.max(r.y,Math.min(c.y,r.y+r.h)),dx=c.x-xx,dy=c.y-yy;return dx*dx+dy*dy<c.r*c.r}function part(x,y,col,n=8){for(let i=0;i<n;i++)O.parts.push({x,y,vx:(Math.random()-.5)*4.8,vy:(Math.random()-.8)*4.6,life:34,col})}
function jump(){if(P.on){P.vy=-15.5;P.on=false;sfx.j()}}function dash(){if(P.dash<=0){P.vx=P.dir*12.5;P.dash=70;P.inv=Math.max(P.inv,10);sfx.d();part(P.x+18,P.y+28,'#fff1a6',12)}}function hurt(){if(P.inv>0)return;P.hp--;sfx.h();if(P.hp<=0){state='over';clearInterval(timer);show('Game Over',`你闯到了第 ${lv+1} 关，收集了 ${P.c} 枚金币和 ${P.g} 颗宝石。`,'再玩一次');primary.onclick=start;return}P.x=P.cx;P.y=P.cy;P.vx=P.vy=0;P.inv=100;ui()}
function collide(pl,px,py){if(!R(P,pl))return;let pb=py+P.h,pt=py,pr=px+P.w,plf=px;if(pl.t=='c'){if(P.vy>=0&&pb<=pl.y+8){P.y=pl.y-P.h;P.vy=0;P.on=true;if(pl.dx)P.x+=pl.dx}return}if(P.vy>=0&&pb<=pl.y+6){P.y=pl.y-P.h;P.vy=0;P.on=true}else if(P.vy<0&&pt>=pl.y+pl.h-6){P.y=pl.y+pl.h;P.vy=0}else if(P.vx>0&&pr<=pl.x+6){P.x=pl.x-P.w;P.vx=0}else if(P.vx<0&&plf>=pl.x+pl.w-6){P.x=pl.x+pl.w;P.vx=0}}
function update(){if(state!='play')return;if(input.j)jump();if(input.d){dash();input.d=false}O.move.forEach(m=>{m.px=m.x;m.py=m.y;if(m.axis=='x'){m.x+=m.s*m.dir;if(m.x<m.min||m.x>m.max)m.dir*=-1}else{m.y+=m.s*m.dir;if(m.y<m.min||m.y>m.max)m.dir*=-1}});let px=P.x,py=P.y;if(input.l){P.vx-=.74;P.dir=-1}if(input.r){P.vx+=.74;P.dir=1}if(!input.l&&!input.r)P.vx*=.84;P.vx=Math.max(-6.7,Math.min(6.7,P.vx));P.vy+=.72;P.vy=Math.min(18,P.vy);P.x+=P.vx;P.x=Math.max(0,Math.min(world-P.w,P.x));P.y+=P.vy;P.on=false;[...O.p,...O.cloud].forEach(q=>collide(q,px,py));O.move.forEach(m=>collide({...m,dx:m.x-m.px},px,py));if(P.y>H+120)hurt();if(P.inv>0)P.inv--;if(P.dash>0)P.dash--;cam=Math.max(0,Math.min(world-W,P.x-W*.38));O.mob.forEach(e=>{if(!e.alive)return;e.x+=e.vx;if(e.x<e.min||e.x>e.max)e.vx*=-1;if(e.type=='f'){let base=O.theme=='hard'?185:O.theme=='sunset'?210:225;e.y=base+Math.sin(performance.now()/320+e.phase)*34}if(R(P,e)){let stomp=P.vy>0&&P.y+P.h-P.vy<=e.y+12;if(stomp){e.alive=false;P.vy=-10.5;P.c+=2;part(e.x+e.w/2,e.y+e.h/2,'#c996ff',16);sfx.h();ui()}else hurt()}});O.coin.forEach(c=>{if(!c.got&&CR(c,P)){c.got=true;P.c++;sfx.c();part(c.x,c.y,'#ffe27d',8);ui()}});O.gem.forEach(g=>{if(!g.got&&CR(g,P)){g.got=true;P.g++;sfx.c();part(g.x,g.y,'#79edff',12);ui()}});O.trap.forEach(t=>{if(R(P,t))hurt()});O.spring.forEach(s=>{if(R(P,s)&&P.vy>=0){P.y=s.y-P.h;P.vy=-21;P.on=false;tone(760,.12,'triangle');part(s.x+s.w/2,s.y,'#ff9cdd',12)}});if(!O.cp.on&&P.x>O.cp.x){O.cp.on=true;P.cx=O.cp.x+60;P.cy=260;part(O.cp.x,O.cp.y,'#7ff0a0',18)}if(P.x+P.w>O.flag.x){if(lv<MAP.length-1){state='between';clearInterval(timer);sfx.w();cover.innerHTML=`<div class="panel"><h1>第 ${lv+2} 关加载中</h1><p>通过第 ${lv+1} 关！下一关：${MAP[lv+1].name}。${lv+1==2?'这是超难终极关，地刺和移动平台更多。':'难度继续提升。'}</p><div class="btns"><button id="nxt">进入第 ${lv+2} 关</button></div></div>`;cover.style.display='flex';nxt.onclick=next}else{state='win';clearInterval(timer);sfx.w();let score=scoreSave();show('三关通关成功！',`最终得分 ${score}。金币 ${P.c}，宝石 ${P.g}。`,'再玩一次',rankHTML());primary.onclick=start}}O.parts.forEach(a=>{a.x+=a.vx;a.y+=a.vy;a.vy+=.16;a.life--});O.parts=O.parts.filter(a=>a.life>0);ui()}
function rank(){try{return JSON.parse(localStorage.getItem(LB)||'[]')}catch{return[]}}function rankHTML(){let r=rank();if(!r.length)return'<div class="rank"><h3>排行榜</h3><p style="text-align:center">暂无记录</p></div>';return'<div class="rank"><h3>排行榜 TOP 8</h3>'+r.map((a,i)=>`<div><span>${i+1}. ${a.n}</span><span>${a.s} 分</span></div>`).join('')+'</div>'}function scoreSave(){let s=P.c*10+P.g*60+P.hp*140+time*6+1500,n=(prompt('通关成功！输入名字上榜：','PLAYER')||'PLAYER').slice(0,10),r=rank();r.push({n,s});r.sort((a,b)=>b.s-a.s);localStorage.setItem(LB,JSON.stringify(r.slice(0,8)));return s}function show(title,txt,label='开始游戏',extra=''){cover.innerHTML=`<div class="panel"><h1>${title}</h1><p>${txt}</p>${extra}<div class="btns"><button id="primary">${label}</button><button id="showRank" class="b2">排行榜</button></div></div>`;cover.style.display='flex';showRank.onclick=()=>{let p=cover.querySelector('.panel');if(!p.querySelector('.rank'))p.insertAdjacentHTML('beforeend',rankHTML())}}
function rr(x0,y,w,h,r,fill,stroke){x.beginPath();x.moveTo(x0+r,y);x.lineTo(x0+w-r,y);x.quadraticCurveTo(x0+w,y,x0+w,y+r);x.lineTo(x0+w,y+h-r);x.quadraticCurveTo(x0+w,y+h,x0+w-r,y+h);x.lineTo(x0+r,y+h);x.quadraticCurveTo(x0,y+h,x0,y+h-r);x.lineTo(x0,y+r);x.quadraticCurveTo(x0,y,x0+r,y);x.fillStyle=fill;x.fill();if(stroke){x.strokeStyle=stroke;x.lineWidth=2;x.stroke()}}
function bg(){let hard=O.theme=='hard',sun=O.theme=='sunset',g=x.createLinearGradient(0,0,0,H);if(hard){g.addColorStop(0,'#2b245e');g.addColorStop(.3,'#7b3f8f');g.addColorStop(.58,'#ffad78');g.addColorStop(.581,'#71584b');g.addColorStop(1,'#353238')}else if(sun){g.addColorStop(0,'#7d8cff');g.addColorStop(.28,'#ffb3a5');g.addColorStop(.58,'#ffe8c5');g.addColorStop(.581,'#b7d38d');g.addColorStop(1,'#6c8f61')}else{g.addColorStop(0,'#77d4ff');g.addColorStop(.58,'#dbf8ff');g.addColorStop(.581,'#a2df8c');g.addColorStop(1,'#6dbb61')}x.fillStyle=g;x.fillRect(0,0,W,H);[120,500,980,1450,2050,2620,3300,3920,4550,5200,5850].forEach((v,i)=>{let sx=v-cam*.26,yy=70+(i%3)*24;x.fillStyle=hard?'rgba(255,190,170,.35)':sun?'rgba(255,238,235,.62)':'rgba(255,255,255,.88)';x.beginPath();x.arc(sx,yy,26,0,7);x.arc(sx+32,yy-14,34,0,7);x.arc(sx+70,yy,24,0,7);x.rect(sx-8,yy,86,24);x.fill()})}
function drawPlat(q){let sx=q.x-cam;if(sx+q.w<-60||sx>W+60)return;if(q.t=='g'){let gr=x.createLinearGradient(0,q.y,0,q.y+q.h);if(O.theme=='hard'){gr.addColorStop(0,'#9f6a5e');gr.addColorStop(.3,'#774d45');gr.addColorStop(1,'#3a3033');rr(sx,q.y,q.w,q.h,22,gr,'#2d2529')}else{gr.addColorStop(0,'#87d36c');gr.addColorStop(.25,'#66b95b');gr.addColorStop(1,'#6f8a58');rr(sx,q.y,q.w,q.h,22,gr,'#5a7a4e')}x.fillStyle='rgba(255,255,255,.35)';x.fillRect(sx+14,q.y+8,q.w-28,8)}else{let gr=x.createLinearGradient(0,q.y,0,q.y+q.h);gr.addColorStop(0,'#fff');gr.addColorStop(1,O.theme=='hard'?'#ffd5e7':'#d9e6ff');rr(sx,q.y,q.w,q.h,18,gr,O.theme=='hard'?'#d49ab6':'#a9bde6')}}function draw(){bg();[...O.p,...O.cloud,...O.move].forEach(drawPlat);O.trap.forEach(t=>{let sx=t.x-cam;x.fillStyle=O.theme=='hard'?'#ff4f63':'#f06a74';for(let i=0;i<t.w;i+=18){x.beginPath();x.moveTo(sx+i,t.y+t.h);x.lineTo(sx+i+9,t.y+2);x.lineTo(sx+i+18,t.y+t.h);x.fill()}});O.spring.forEach(s=>rr(s.x-cam,s.y,s.w,s.h,10,'#ff8fcb','#c85d99'));O.coin.forEach(c=>{if(c.got)return;let sx=c.x-cam,gr=x.createRadialGradient(sx-4,c.y-6,2,sx,c.y,14);gr.addColorStop(0,'#fff7ba');gr.addColorStop(1,'#f4b63f');x.fillStyle=gr;x.beginPath();x.ellipse(sx,c.y,c.r,c.r*1.24,0,0,7);x.fill();x.strokeStyle='#c48d1f';x.stroke()});O.gem.forEach(g=>{if(g.got)return;let sx=g.x-cam;x.fillStyle='#7eecff';x.beginPath();x.moveTo(sx,g.y-16);x.lineTo(sx+16,g.y);x.lineTo(sx,g.y+16);x.lineTo(sx-16,g.y);x.fill()});O.mob.forEach(e=>{if(!e.alive)return;let sx=e.x-cam;if(e.type=='w'){x.fillStyle=O.theme=='hard'?'#c85bff':'#8c66f3';x.beginPath();x.ellipse(sx+e.w/2,e.y+e.h/2+3,e.w/2,e.h/2,0,0,7);x.fill();x.fillStyle='#fff';x.beginPath();x.arc(sx+15,e.y+13,5,0,7);x.arc(sx+28,e.y+13,5,0,7);x.fill();x.fillStyle='#202433';x.beginPath();x.arc(sx+15,e.y+13,2,0,7);x.arc(sx+28,e.y+13,2,0,7);x.fill()}else{x.fillStyle=O.theme=='hard'?'#ff5f91':'#ff7da7';x.beginPath();x.ellipse(sx+e.w/2,e.y+e.h/2,18,12,0,0,7);x.fill();x.fillStyle='rgba(255,255,255,.85)';x.beginPath();x.ellipse(sx+4,e.y+8,16,8,-.35,0,7);x.ellipse(sx+e.w-4,e.y+8,16,8,.35,0,7);x.fill()}});let c=O.cp,sx=c.x-cam;x.fillStyle='#d09a75';x.fillRect(sx,c.y,c.w,c.h);rr(sx+c.w,c.y+12,74,34,12,c.on?'#7ff0a0':'#fff',c.on?'#4aaa68':'#cbd7ef');let f=O.flag,fx=f.x-cam;x.fillStyle='#d09a75';x.fillRect(fx,f.y,f.w,f.h);x.fillStyle=lv==2?'#ff4f63':lv==1?'#8d7cff':'#ff8a72';x.beginPath();x.moveTo(fx+f.w,f.y+8);x.quadraticCurveTo(fx+f.w+74,f.y+34,fx+f.w,f.y+66);x.fill();x.fillStyle='#fff';x.font='bold 18px Arial';x.fillText(lv==2?'HARD':lv==1?'FINAL':'GOAL',fx+30,f.y+42);drawPlayer();O.parts.forEach(a=>{x.globalAlpha=a.life/34;x.fillStyle=a.col;x.beginPath();x.arc(a.x-cam,a.y,3,0,7);x.fill();x.globalAlpha=1})}
function drawPlayer(){if(P.inv>0&&Math.floor(P.inv/6)%2==0)return;let sx=P.x-cam,yy=P.y;x.save();if(P.dir<0){x.translate(sx+P.w,yy);x.scale(-1,1)}else x.translate(sx,yy);x.fillStyle='#43527a';x.beginPath();x.ellipse(19,14,14,12,0,0,7);x.fill();x.fillStyle='#ffd8be';x.beginPath();x.ellipse(19,18,12,11,0,0,7);x.fill();x.fillStyle='#ff6a70';x.beginPath();x.ellipse(19,28,13,7,0,0,7);x.fill();let gr=x.createLinearGradient(0,30,0,56);gr.addColorStop(0,'#f5f8ff');gr.addColorStop(1,'#dfe9ff');rr(8,30,22,18,8,gr,'#c1d2f5');x.fillStyle='#4b7dff';x.fillRect(10,45,8,11);x.fillRect(21,45,8,11);x.fillStyle='#fff';x.beginPath();x.ellipse(15,17,3,4,0,0,7);x.ellipse(23,17,3,4,0,0,7);x.fill();x.fillStyle='#2d3854';x.beginPath();x.arc(15,18,1.4,0,7);x.arc(23,18,1.4,0,7);x.fill();x.restore()}
function loop(){update();draw();raf=requestAnimationFrame(loop)}function pause(){if(state=='play'){state='pause';show('Paused','游戏已暂停。点击按钮继续。','继续游戏');primary.onclick=()=>{cover.style.display='none';state='play'}}}document.addEventListener('keydown',e=>{if(e.code=='ArrowLeft'||e.code=='KeyA')input.l=true;if(e.code=='ArrowRight'||e.code=='KeyD')input.r=true;if(e.code=='ArrowUp'||e.code=='KeyW'||e.code=='Space'){if(!input.j)jump();input.j=true}if(e.code=='ShiftLeft'||e.code=='ShiftRight'||e.code=='KeyX')input.d=true;if(e.code=='KeyP')pause()});document.addEventListener('keyup',e=>{if(e.code=='ArrowLeft'||e.code=='KeyA')input.l=false;if(e.code=='ArrowRight'||e.code=='KeyD')input.r=false;if(e.code=='ArrowUp'||e.code=='KeyW'||e.code=='Space')input.j=false});
function tap(el,d,u){let on=e=>{e.preventDefault();el.classList.add('on');d()},off=e=>{e.preventDefault();el.classList.remove('on');if(u)u()};['touchstart','mousedown'].forEach(n=>el.addEventListener(n,on,{passive:false}));['touchend','touchcancel','mouseup','mouseleave'].forEach(n=>el.addEventListener(n,off,{passive:false}))}tap(aBtn,()=>{input.j=true;jump()},()=>input.j=false);tap(bBtn,()=>{input.d=true;dash()},()=>input.d=false);mStart.onclick=()=>{if(['menu','over','win'].includes(state))start()};mPause.onclick=pause;let joy=false;function joyMove(cx){let r=joy.getBoundingClientRect()}const joyEl=document.getElementById('joy'),stick=document.getElementById('stick');let using=false;function moveJoy(clientX){let r=joyEl.getBoundingClientRect(),dx=clientX-(r.left+r.width/2),c=Math.max(-28,Math.min(28,dx));stick.style.transform=`translate(${c}px,0)`;input.l=c<-10;input.r=c>10}function endJoy(){stick.style.transform='translate(0,0)';input.l=false;input.r=false;using=false}joyEl.addEventListener('touchstart',e=>{using=true;moveJoy(e.touches[0].clientX)},{passive:false});joyEl.addEventListener('touchmove',e=>{if(using){e.preventDefault();moveJoy(e.touches[0].clientX)}},{passive:false});joyEl.addEventListener('touchend',endJoy,{passive:false});joyEl.addEventListener('touchcancel',endJoy,{passive:false});joyEl.addEventListener('mousedown',e=>{using=true;moveJoy(e.clientX)});window.addEventListener('mousemove',e=>{if(using)moveJoy(e.clientX)});window.addEventListener('mouseup',endJoy);start.onclick=start;rank.onclick=()=>{rankBox.innerHTML=rankHTML();rankBox.style.display=rankBox.style.display==='none'?'block':'none'};load(0,false);draw();</script></body></html>
